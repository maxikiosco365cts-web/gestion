<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prueba - Calendario Semanal</title>
  <style>
    :root {
      --bg: #121317;
      --card: #1B1A1F;
      --text: #EDEDEE;
      --muted: #B3B3B7;
      --radius: 16px;
      --shadow: 0 10px 25px rgba(0,0,0,.35);
      --primary: #4CAF50;
      --danger: #e74c3c;
      --edit: #f39c12;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      min-height: 100vh;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    h1 {
      margin: 0.8em 0 1em;
      text-align: center;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .grid {
      display: grid;
      grid-template-columns: 60px repeat(7, 1fr);
      gap: 0;
      border: 1px solid #444;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      background: var(--card);
    }

    .cell {
      background: var(--card);
      border: 1px solid #333;
      min-height: 220px;
      position: relative;
    }

    .cell.header {
      min-height: 50px;
      padding: 8px;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #25242A;
      font-weight: bold;
    }

    .time-col {
      background: #1F1E24;
      font-weight: bold;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .day-column {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px;
      height: 100%;
      min-height: 200px;
    }

    .slot {
      background: rgba(76, 175, 80, 0.12);
      border: 1px solid var(--primary);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: all 0.25s ease;
      width: 120px;
      height: 60px;
    }

    .slot:hover {
      background: rgba(76, 175, 80, 0.25);
    }

    .slot-name {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.2;
    }

    .delete-btn {
      position: absolute;
      top: 4px;
      right: 6px;
      background: none;
      border: none;
      color: #aaa;
      font-size: 16px;
      cursor: pointer;
      opacity: 0.7;
    }

    .delete-btn:hover {
      color: var(--danger);
      opacity: 1;
    }

    .edit-btn {
      position: absolute;
      bottom: 6px;
      right: 6px;
      background: none;
      border: none;
      color: var(--edit);
      font-size: 16px;
      cursor: pointer;
      opacity: 0.8;
    }

    .edit-btn:hover {
      opacity: 1;
    }

    /* ── Contenedor único de slots grises ── */
    #employee-section {
      background: var(--card);
      border-radius: var(--radius);
      padding: 4px 6px; /* MÍNIMO padding: casi pegado arriba/abajo, solo 6px a los lados */
      margin: 10px 0 0 0;
      box-shadow: var(--shadow);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: auto; /* se ajusta solo al contenido */
    }

    .empty-slots-container {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 900px;
    }

    .empty-slot {
      background: rgba(255, 255, 255, 0.08);
      border: 1px dashed var(--muted);
      border-radius: 8px;
      width: 120px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .empty-slot:hover {
      background: rgba(76, 175, 80, 0.2);
      border-color: var(--primary);
    }

    .empty-slot .plus {
      font-size: 24px;
      color: var(--muted);
    }

    .day-column.drag-over {
      background: rgba(76,175,80,0.15);
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Prueba - Calendario Semanal</h1>

  <div class="grid" id="weekly-grid">
    <div class="cell header"></div>
    <div class="cell header">Lunes</div>
    <div class="cell header">Martes</div>
    <div class="cell header">Miércoles</div>
    <div class="cell header">Jueves</div>
    <div class="cell header">Viernes</div>
    <div class="cell header">Sábado</div>
    <div class="cell header">Domingo</div>

    <div class="cell time-col">Turnos</div>

    <div class="cell"><div class="day-column" data-day="Lunes"></div></div>
    <div class="cell"><div class="day-column" data-day="Martes"></div></div>
    <div class="cell"><div class="day-column" data-day="Miércoles"></div></div>
    <div class="cell"><div class="day-column" data-day="Jueves"></div></div>
    <div class="cell"><div class="day-column" data-day="Viernes"></div></div>
    <div class="cell"><div class="day-column" data-day="Sábado"></div></div>
    <div class="cell"><div class="day-column" data-day="Domingo"></div></div>
  </div>

  <!-- Contenedor único de slots grises (variante 3) -->
  <div id="employee-section">
    <div class="empty-slots-container" id="empty-slots"></div>
  </div>
</div>

<script>
// === Inicialización de 6 slots grises predefinidos ===
function initEmptySlots() {
  const container = document.getElementById('empty-slots');
  container.innerHTML = '';

  for (let i = 0; i < 6; i++) {
    const slot = document.createElement('div');
    slot.className = 'empty-slot';
    slot.innerHTML = '<div class="plus">+</div>';

    // Click para añadir/editar nombre
    slot.onclick = () => {
      const name = prompt("Ingresa o edita el nombre para este slot:");
      if (name && name.trim()) {
        const trimmedName = name.trim();
        slot.innerHTML = `
          <div class="slot-name">${trimmedName}</div>
          <button class="delete-btn">×</button>
          <button class="edit-btn">✏️</button>
        `;
        slot.style.background = 'rgba(76, 175, 80, 0.3)';
        slot.style.border = '1px solid var(--primary)';
        slot.draggable = true;

        // Dragstart solo cuando tiene nombre
        slot.addEventListener('dragstart', e => {
          e.dataTransfer.setData('text/plain', trimmedName);
          e.dataTransfer.effectAllowed = 'copy';
          e.dataTransfer.setDragImage(new Image(), 0, 0);
        });

        // Delete
        slot.querySelector('.delete-btn').onclick = (e) => {
          e.stopPropagation();
          slot.innerHTML = '<div class="plus">+</div>';
          slot.style.background = 'rgba(255, 255, 255, 0.08)';
          slot.style.border = '1px dashed var(--muted)';
          slot.style.cursor = 'pointer';
          slot.draggable = false;
        };

        // Edit
        slot.querySelector('.edit-btn').onclick = (e) => {
          e.stopPropagation();
          const newName = prompt("Nuevo nombre:", trimmedName);
          if (newName && newName.trim() !== trimmedName) {
            slot.querySelector('.slot-name').textContent = newName.trim();
          }
        };
      }
    };

    container.appendChild(slot);
  }
}

// === Drag & Drop en columnas de días ===
document.querySelectorAll('.day-column').forEach(column => {
  column.addEventListener('dragover', e => {
    e.preventDefault();
    column.classList.add('drag-over');
  });

  column.addEventListener('dragleave', () => {
    column.classList.remove('drag-over');
  });

  column.addEventListener('drop', e => {
    e.preventDefault();
    column.classList.remove('drag-over');

    const name = e.dataTransfer.getData('text/plain');
    if (!name) return;

    const slots = column.querySelectorAll('.slot');
    const count = slots.length;

    if (count < 3) {
      const slot = document.createElement('div');
      slot.className = 'slot';

      slot.innerHTML = `
        <div class="slot-name">${name}</div>
        <div class="slot-hours">${
          count === 0 ? '16 horas' :
          count === 1 ? '12 horas' : '8 horas'
        }</div>
        <button class="delete-btn">×</button>
      `;

      slot.querySelector('.delete-btn').onclick = () => {
        slot.remove();
        updateSlotsLayout(column);
      };

      column.appendChild(slot);
      updateSlotsLayout(column);
      return;
    }

    const targetSlot = e.target.closest('.slot');
    if (targetSlot) {
      targetSlot.querySelector('.slot-name').textContent = name;
    }
  });
});

function updateSlotsLayout(column) {
  const slots = column.querySelectorAll('.slot');
  const count = slots.length;

  slots.forEach(slot => {
    const hoursEl = slot.querySelector('.slot-hours');
    if (count === 1) {
      hoursEl.textContent = '16 horas';
      slot.style.flex = '2';
    } else if (count === 2) {
      hoursEl.textContent = '12 horas';
      slot.style.flex = '1';
    } else if (count === 3) {
      hoursEl.textContent = '8 horas';
      slot.style.flex = '1';
    }
  });
}

// Inicialización
document.addEventListener('DOMContentLoaded', () => {
  initEmptySlots();
});
</script>
</body>
</html>
