<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema</title>
  
  <style>
    :root {
      --bg-main: #0f0f11;
      --bg-secondary: #16181d;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0a5;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --border: #2a2e38;
      --sidebar-width: 240px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-main);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Contenedor principal con sidebar */
    .layout {
      display: flex;
      flex: 1;
      min-height: calc(100vh - 60px - 50px); /* navbar + footer */
    }

    /* Menú superior */
    .navbar {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }

    .logo {
      font-size: 1.7rem;
      font-weight: bold;
      color: var(--accent);
      letter-spacing: -1px;
    }

    .nav-menu {
      display: flex;
      list-style: none;
      gap: 8px;
    }

    .nav-item a {
      color: var(--text-secondary);
      text-decoration: none;
      padding: 0.8rem 1.3rem;
      border-radius: 6px;
      font-size: 0.95rem;
      transition: all 0.18s ease;
    }

    .nav-item a:hover,
    .nav-item a.active {
      background: rgba(99, 102, 241, 0.12);
      color: var(--accent-hover);
    }

    .nav-item a.active {
      background: rgba(99, 102, 241, 0.22);
      color: var(--accent);
      font-weight: 500;
    }

    /* Sidebar vertical */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      padding: 1.5rem 0;
      position: fixed;
      top: 60px;
      bottom: 50px;
      overflow-y: auto;
      z-index: 90;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 1rem 1.5rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 1rem;
      transition: all 0.18s ease;
      cursor: pointer;
    }

    .sidebar-item:hover {
      background: rgba(99, 102, 241, 0.1);
      color: var(--accent-hover);
    }

    .sidebar-item.active {
      background: rgba(99, 102, 241, 0.18);
      color: var(--accent);
      font-weight: 500;
      border-left: 4px solid var(--accent);
    }

    .sidebar-icon {
      font-size: 1.4rem;
      width: 28px;
      text-align: center;
    }

    /* Contenido principal */
    .main-content {
      margin-left: var(--sidebar-width);
      flex: 1;
      padding: 2rem;
    }

    /* Footer inferior fijo */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 50px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      font-size: 0.9rem;
      color: var(--text-secondary);
      z-index: 90;
    }

    .footer-left {
      min-width: 220px;
      padding-left: var(--sidebar-width);
    }

    .footer-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-weight: 500;
      color: var(--text-primary);
    }

    .footer-right {
      min-width: 100px;
      text-align: right;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo" id="randomIcon"></div>
    
    <ul class="nav-menu">
      <li class="nav-item"><a href="#" class="active">Artículos</a></li>
      <li class="nav-item"><a href="#">Clientes</a></li>
      <li class="nav-item"><a href="#">Compras</a></li>
      <li class="nav-item"><a href="#">Ventas</a></li>
      <li class="nav-item"><a href="#">Caja</a></li>
      <li class="nav-item"><a href="#">Proveedores</a></li>
      <li class="nav-item"><a href="#">Ayuda</a></li>
      <li class="nav-item"><a href="#">Salir</a></li>
    </ul>

    <div></div>
  </nav>

  <div class="layout">
    <!-- Sidebar izquierda -->
    <aside class="sidebar">
      <a href="kiosco365_venta.html" class="sidebar-item active">
        <span class="sidebar-icon">📦</span>
        <span>Artículos</span>
      </a>
      <a href="#" class="sidebar-item">
        <span class="sidebar-icon">🛒</span>
        <span>Compras</span>
      </a>
      <a href="#" class="sidebar-item">
        <span class="sidebar-icon">💳</span>
        <span>Ventas</span>
      </a>
      <a href="#" class="sidebar-item">
        <span class="sidebar-icon">💵</span>
        <span>Caja</span>
      </a>
      <a href="#" class="sidebar-item">
        <span class="sidebar-icon">📊</span>
        <span>Consultar Ventas</span>
      </a>
      <a href="#" class="sidebar-item">
        <span class="sidebar-icon">📝</span>
        <span>Notas</span>
      </a>
      <a href="#" class="sidebar-item">
        <span class="sidebar-icon">🔒</span>
        <span>Cierre de Turno</span>
      </a>
    </aside>

    <!-- Contenido principal (sigue vacío) -->
    <main class="main-content">
      <!-- Centro limpio -->
    </main>
  </div>

  <footer class="footer">
    <div class="footer-left" id="fecha"></div>
    <div class="footer-center">Usuario: David UNNE</div>
    <div class="footer-right" id="hora"></div>
  </footer>

  <script>
    // Icono random en navbar
    const icons = ["🐱", "🚀", "⚡", "🌙", "🔥", "🦊", "🌵", "🎸", "☄️", "🪐", "🦄", "🍍"];
    document.getElementById("randomIcon").textContent = 
      icons[Math.floor(Math.random() * icons.length)];

    // Fecha
    function actualizarFecha() {
      const fecha = new Date();
      const dias = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
      const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", 
                     "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
      
      const diaSemana = dias[fecha.getDay()];
      const dia = fecha.getDate();
      const mes = meses[fecha.getMonth()];
      const año = fecha.getFullYear();

      document.getElementById("fecha").textContent = 
        `${diaSemana}, ${dia} de ${mes} de ${año}`;
    }

    // Hora formato 12h
    function actualizarHora() {
      const ahora = new Date();
      let horas = ahora.getHours();
      const minutos = ahora.getMinutes().toString().padStart(2, '0');
      const ampm = horas >= 12 ? 'PM' : 'AM';
      
      horas = horas % 12 || 12;

      document.getElementById("hora").textContent = 
        `\( {horas}: \){minutos} ${ampm}`;
    }

    actualizarFecha();
    actualizarHora();
    setInterval(actualizarHora, 60000);
  </script>

</body>
</html>
