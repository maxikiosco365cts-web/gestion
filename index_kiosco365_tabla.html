<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Horario Semanal</title>
  <style>
    :root {
      --bg: #121317;
      --card: #1B1A1F;
      --text: #EDEDEE;
      --muted: #B3B3B7;
      --radius: 16px;
      --shadow: 0 10px 25px rgba(0,0,0,.35);
      --primary: #4CAF50;
      --danger: #e74c3c;
      --edit: #f39c12;
      --btn-dark: #25242A;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      min-height: 100vh;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    nav {
      background: var(--card);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,.12);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-left img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    .nav-right a {
      color: var(--text);
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .nav-right a:hover {
      background: rgba(255,255,255,0.1);
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 16px;
    }

    h2, h1 {
      margin: 30px 0 15px;
      font-size: 20px;
      font-weight: 500;
      text-align: left;
    }

    #ultimo-guardado, #ultimo-guardado-preventistas {
      font-size: 14px;
      color: var(--muted);
      margin-left: 10px;
    }

    /* Grid base (usado por ambos calendarios) */
    
    .grid {
      display: grid;
      grid-template-columns: 60px repeat(7, minmax(130px, 1fr));  /* mínimo 130px por día */
      gap: 0;
      border: 1px solid #444;
      border-radius: var(--radius);
      overflow-x: auto;           /* ← scroll horizontal si no cabe todo */
      overflow-y: hidden;
      box-shadow: var(--shadow);
      background: var(--card);
      margin-bottom: 30px;
      max-width: 100%;            /* no se salga del container */
    }

    /* Estilos específicos del calendario semanal nuevo */
    #weekly-grid .cell {
      background: var(--card);
      border: 1px solid #333;
      min-height: 220px;
      position: relative;
    }

    #weekly-grid .cell.header {
      min-height: 50px;
      padding: 8px;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #25242A;
      font-weight: bold;
    }

    #weekly-grid .time-col {
      background: #1F1E24;
      font-weight: bold;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #weekly-grid .day-column {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px;
      height: 100%;
      min-height: 200px;
    }
    
    #weekly-grid .slot {
      background: rgba(76, 175, 80, 0.12);
      border: 1px solid var(--primary);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: all 0.25s ease;
      width: 100%;                /* ← ocupa todo el ancho disponible */
      max-width: 140px;           /* ← tope para que no se haga gigante */
      height: 60px;
      margin: 0 auto;             /* ← centra el slot dentro de la celda */
      box-sizing: border-box;
    }

    #weekly-grid .slot:hover {
      background: rgba(76, 175, 80, 0.25);
    }

    #weekly-grid .slot-name {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.2;
    }

    #weekly-grid .delete-btn {
      position: absolute;
      top: 4px;
      right: 6px;
      background: none;
      border: none;
      color: #aaa;
      font-size: 16px;
      cursor: pointer;
      opacity: 0.7;
    }

    #weekly-grid .delete-btn:hover {
      color: var(--danger);
      opacity: 1;
    }

    #weekly-grid .edit-btn {
      position: absolute;
      bottom: 6px;
      right: 6px;
      background: none;
      border: none;
      color: var(--edit);
      font-size: 16px;
      cursor: pointer;
      opacity: 0.8;
    }

    #weekly-grid .edit-btn:hover {
      opacity: 1;
    }

    #weekly-grid .day-column.drag-over {
      background: rgba(76,175,80,0.15);
    }

    /* Zona inferior alineada horizontalmente */
    .bottom-controls {
      margin-top: 30px;
      display: flex;
      align-items: center;
      gap: 25px;
      justify-content: center;
      flex-wrap: nowrap;
    }

    .buttons-column {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    .control-btn {
      width: 130px;
      height: 36px;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .control-btn.green {
      background: var(--primary);
    }

    .control-btn.green:hover {
      background: #45a049;
      transform: translateY(-1px);
    }

    .control-btn.dark {
      background: var(--btn-dark);
    }

    .control-btn.dark:hover {
      background: #2f2e34;
      transform: translateY(-1px);
    }

    /* Employee section ajustado para alineación */
    #employee-section {
      background: var(--card);
      border-radius: var(--radius);
      padding: 12px 16px;
      box-shadow: var(--shadow);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
      min-height: 80px;
    }

    .empty-slots-container {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      align-items: center;
    }

    .empty-slot {
      background: rgba(255, 255, 255, 0.08);
      border: 1px dashed var(--muted);
      border-radius: 8px;
      width: 130px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .empty-slot:hover {
      background: rgba(76, 175, 80, 0.2);
      border-color: var(--primary);
    }

    .empty-slot .plus {
      font-size: 28px;
      color: var(--muted);
    }

    /* Botones dentro de los slots inferiores (X y E) */
    #empty-slots .delete-btn {
      position: absolute;
      background: transparent;
      border: none;
      padding: 0;
      font-size: 16px;
      cursor: pointer;
      z-index: 2;
      color: var(--text);
      opacity: 0.9;
    }

    #empty-slots .delete-btn {
      top: 4px;
      right: 6px;
      color: #ff6b6b;
    }

    #empty-slots .delete-btn:hover {
      color: var(--danger);
      opacity: 1;
    }

    /* Estilos para preventistas */
    .preventistas-grid .cell {
      min-height: 50px;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preventistas-grid input {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      color: var(--text);
      text-align: center;
      font-size: 14px;
    }

    .preventistas-grid input:focus {
      outline: 2px solid var(--primary);
      background: rgba(76, 175, 80, 0.15);
    }

    /* Botones de preventistas uno al lado del otro */
    .preventistas-controls {
      margin: 20px 0 40px;
      display: flex;
      justify-content: flex-start;
      gap: 15px;
    }

    .preventistas-controls .control-btn {
      width: 160px; /* un poco más anchos para que queden bien */
    }
  </style>
</head>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBlXlh4E3ZA7EZWa1jp9g3D9NYMPA3EU6o",
    authDomain: "maxikiosco365-cts.firebaseapp.com",
    projectId: "maxikiosco365-cts",
    storageBucket: "maxikiosco365-cts.firebasestorage.app",
    messagingSenderId: "626205380433",
    appId: "1:626205380433:web:3057e76c60629b89b80d70"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const accessKey = sessionStorage.getItem("accessKey");
  const sucursalCode = sessionStorage.getItem("sucursal");

  if (!accessKey || !sucursalCode) {
    alert("Acceso no autorizado. Volvé al inicio e iniciá sesión.");
    window.location.href = "index_kiosco365.html";
  }

  const sucursalNames = {
    unne: "Unne",
    sarmiento: "Sarmiento",
    alta_gracia: "Alta Gracia",
    morgue: "Morgue"
  };

  document.getElementById("userDisplay").textContent = 
    (sucursalNames[sucursalCode] || sucursalCode.toUpperCase()) + " (" + accessKey + ")";

  // ── LOCALSTORAGE para los 5 slots inferiores ───────────────────────────────
  const SLOTS_KEY = 'kiosco365_empty_slots';

  function saveEmptySlots() {
    const slots = document.querySelectorAll('#empty-slots .empty-slot');
    const names = [];
    slots.forEach(slot => {
      const nameEl = slot.querySelector('.slot-name');
      names.push(nameEl ? nameEl.textContent.trim() : '');
    });
    localStorage.setItem(SLOTS_KEY, JSON.stringify(names));
  }

  function loadEmptySlots() {
    const saved = localStorage.getItem(SLOTS_KEY);
    if (!saved) return;

    const names = JSON.parse(saved);
    const slots = document.querySelectorAll('#empty-slots .empty-slot');

    names.forEach((name, i) => {
      if (!name) return;
      const slot = slots[i];
      if (!slot) return;

      slot.innerHTML = `
        <div class="slot-name">${name}</div>
        <button class="delete-btn">×</button>
      `;
      slot.style.background = 'rgba(76, 175, 80, 0.3)';
      slot.style.border = '1px solid var(--primary)';
      slot.draggable = true;

      // Configurar evento dragstart para slots cargados
      setupSlotDragEvents(slot, name);

      slot.querySelector('.delete-btn').onclick = e => {
        e.stopPropagation();
        slot.innerHTML = '<div class="plus">+</div>';
        slot.style.background = 'rgba(255, 255, 255, 0.08)';
        slot.style.border = '1px dashed var(--muted)';
        slot.draggable = false;
        saveEmptySlots();
      };

      slot.onclick = e => {
        if (e.target === slot.querySelector('.delete-btn')) return;
        const current = slot.querySelector('.slot-name').textContent;
        const newName = prompt("Nuevo nombre:", current);
        if (newName && newName.trim() !== current) {
          slot.querySelector('.slot-name').textContent = newName.trim();
          // Actualizar eventos de arrastre con el nuevo nombre
          setupSlotDragEvents(slot, newName.trim());
          saveEmptySlots();
        }
      };
    });
  }

  // ── Función auxiliar para configurar eventos de drag en slots ──────────────
  function setupSlotDragEvents(slot, name) {
    slot.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', name);
      e.dataTransfer.effectAllowed = 'copy';
      // Para mejorar la experiencia visual durante el arrastre
      setTimeout(() => {
        slot.style.opacity = '0.4';
      }, 0);
    });

    slot.addEventListener('dragend', () => {
      slot.style.opacity = '1';
    });
  }

  // ── 5 slots editables abajo ────────────────────────────────────────────────
  function initEmptySlots() {
    const container = document.getElementById('empty-slots');
    container.innerHTML = '';

    for (let i = 0; i < 5; i++) {
      const slot = document.createElement('div');
      slot.className = 'empty-slot';
      slot.innerHTML = '<div class="plus">+</div>';

      slot.onclick = () => {
        if (slot.querySelector('.slot-name')) {
          const current = slot.querySelector('.slot-name').textContent;
          const newName = prompt("Nuevo nombre:", current);
          if (newName && newName.trim() !== current) {
            slot.querySelector('.slot-name').textContent = newName.trim();
            // Actualizar eventos de arrastre
            setupSlotDragEvents(slot, newName.trim());
            saveEmptySlots();
          }
          return;
        }

        const name = prompt("Ingresa o edita el nombre para este slot:");
        if (name && name.trim()) {
          const trimmedName = name.trim();
          slot.innerHTML = `
            <div class="slot-name">${trimmedName}</div>
            <button class="delete-btn">×</button>
          `;
          slot.style.background = 'rgba(76, 175, 80, 0.3)';
          slot.style.border = '1px solid var(--primary)';
          slot.draggable = true;

          // Configurar eventos de arrastre
          setupSlotDragEvents(slot, trimmedName);

          slot.querySelector('.delete-btn').onclick = e => {
            e.stopPropagation();
            slot.innerHTML = '<div class="plus">+</div>';
            slot.style.background = 'rgba(255, 255, 255, 0.08)';
            slot.style.border = '1px dashed var(--muted)';
            slot.draggable = false;
            saveEmptySlots();
          };

          slot.onclick = e => {
            if (e.target === slot.querySelector('.delete-btn')) return;
            const current = slot.querySelector('.slot-name').textContent;
            const newName = prompt("Nuevo nombre:", current);
            if (newName && newName.trim() !== current) {
              slot.querySelector('.slot-name').textContent = newName.trim();
              // Actualizar eventos de arrastre
              setupSlotDragEvents(slot, newName.trim());
              saveEmptySlots();
            }
          };

          saveEmptySlots();
        }
      };

      container.appendChild(slot);
    }

    loadEmptySlots();
  }

  // ── Nueva función: Reordenar días según sucursal ───────────────────────────
  function reorderCalendarDays() {
    const defaultOrder = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];

    let newOrder = [...defaultOrder];

    if (sucursalCode === "alta_gracia") {
      newOrder = ["Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo", "Lunes"];
    } else if (sucursalCode === "sarmiento") {
      newOrder = ["Miércoles", "Jueves", "Viernes", "Sábado", "Domingo", "Lunes", "Martes"];
    }
    // unne y morgue quedan igual

    // ───── WEEKLY GRID ─────
    const weeklyGrid = document.getElementById("weekly-grid");

    // Guardamos la celda "Turnos" antes de cualquier remoción (es la que se movía de lugar)
    const timeColCell = weeklyGrid.querySelector('.cell.time-col');

    const headers = Array.from(weeklyGrid.querySelectorAll(".cell.header")).slice(1);
    const columns = Array.from(weeklyGrid.querySelectorAll(".day-column")).map(col => col.parentElement);

    const headerMap = {};
    headers.forEach(h => headerMap[h.textContent.trim()] = h);

    const columnMap = {};
    columns.forEach(c => {
      const day = c.querySelector(".day-column").dataset.day;
      columnMap[day] = c;
    });

    // remover actuales (solo los headers y columnas de días)
    headers.forEach(h => h.remove());
    columns.forEach(c => c.remove());

    // REINSERTAMOS LOS HEADERS DE DÍAS ENTRE EL HEADER VACÍO Y LA CELDA "Turnos"
    // Esto corrige el bug: "Turnos" ya no se mueve a la posición del primer día
    newOrder.forEach(day => {
      weeklyGrid.insertBefore(headerMap[day], timeColCell);
    });

    // Luego agregamos las columnas de días al final (después de "Turnos")
    newOrder.forEach(day => {
      weeklyGrid.appendChild(columnMap[day]);
    });

    // ───── PREVENTISTAS GRID ─────
    const prevGrid = document.querySelector(".preventistas-grid");

    const prevHeaders = Array.from(prevGrid.querySelectorAll(".cell.header")).slice(1);

    const prevHeaderMap = {};
    prevHeaders.forEach(h => prevHeaderMap[h.textContent.trim()] = h);

    prevHeaders.forEach(h => h.remove());

    newOrder.forEach(day => {
      prevGrid.insertBefore(prevHeaderMap[day], prevGrid.children[1]);
    });

    // filas (inputs)
    const rows = [];
    let temp = [];

    Array.from(prevGrid.children).slice(8).forEach((el, i) => {
      temp.push(el);
      if (temp.length === 8) {
        rows.push(temp);
        temp = [];
      }
    });

    rows.forEach(row => {
      const label = row[0];
      const inputs = row.slice(1);

      const inputMap = {};
      inputs.forEach(inputCell => {
        const input = inputCell.querySelector("input");
        inputMap[input.dataset.day] = inputCell;
      });

      inputs.forEach(c => c.remove());

      newOrder.forEach(day => {
        label.after(inputMap[day]);
      });
    });
  }

  // ── Drag & Drop (calendario semanal) ───────────────────────────────────────
  document.querySelectorAll('.day-column').forEach(column => {
    column.addEventListener('dragover', e => {
      e.preventDefault();
      column.classList.add('drag-over');
    });

    column.addEventListener('dragleave', () => column.classList.remove('drag-over'));

    column.addEventListener('drop', e => {
      e.preventDefault();
      column.classList.remove('drag-over');
      const name = e.dataTransfer.getData('text/plain');
      if (!name) return;

      const slots = column.querySelectorAll('.slot');
      const count = slots.length;

      if (count < 3) {
        const slot = document.createElement('div');
        slot.className = 'slot';
        slot.innerHTML = `
          <div class="slot-name">${name}</div>
          <div class="slot-hours">${
            count === 0 ? '16 horas' : count === 1 ? '12 horas' : '8 horas'
          }</div>
          <button class="delete-btn">×</button>
        `;

        slot.querySelector('.delete-btn').onclick = () => {
          slot.remove();
          updateSlotsLayout(column);
        };

        column.appendChild(slot);
        updateSlotsLayout(column);
      } else {
        const target = e.target.closest('.slot');
        if (target) target.querySelector('.slot-name').textContent = name;
      }
    });
  });

  function updateSlotsLayout(column) {
    const slots = column.querySelectorAll('.slot');
    const count = slots.length;
    slots.forEach(slot => {
      const h = slot.querySelector('.slot-hours');
      if (count === 1) { h.textContent = '16 horas'; slot.style.flex = '2'; }
      else if (count === 2) { h.textContent = '12 horas'; slot.style.flex = '1'; }
      else if (count === 3) { h.textContent = '8 horas'; slot.style.flex = '1'; }
    });
  }

  // ── Firebase ────────────────────────────────────────────────────────────────
  const scheduleRef = ref(db, `${sucursalCode}/weekly_schedule`);

  onValue(scheduleRef, snap => {
    const data = snap.val() || {};
    document.getElementById("ultimo-guardado").textContent = 
      data.last_saved ? `(Último: ${data.last_saved})` : "";

    document.querySelectorAll('.day-column').forEach(col => {
      col.innerHTML = '';
      const day = col.dataset.day;
      const turns = data[day] || [];
      turns.forEach((name, idx) => {
        if (name && name.trim()) {
          const slot = document.createElement('div');
          slot.className = 'slot';
          slot.innerHTML = `
            <div class="slot-name">${name}</div>
            <div class="slot-hours">${
              idx === 0 ? '16 horas' : idx === 1 ? '12 horas' : '8 horas'
            }</div>
            <button class="delete-btn">×</button>
          `;
          slot.querySelector('.delete-btn').onclick = () => {
            slot.remove();
            updateSlotsLayout(col);
          };
          col.appendChild(slot);
          updateSlotsLayout(col);
        }
      });
    });
  });

  document.getElementById("save-button").onclick = async () => {
    const btn = document.getElementById("save-button");
    btn.disabled = true;
    btn.textContent = "Guardando...";

    const data = {};
    document.querySelectorAll('.day-column').forEach(col => {
      const day = col.dataset.day;
      const slots = col.querySelectorAll('.slot');
      const arr = ['', '', ''];
      slots.forEach((s, i) => {
        arr[i] = s.querySelector('.slot-name').textContent.trim();
      });
      data[day] = arr;
    });

    const payload = { ...data, last_saved: new Date().toLocaleString("es-AR") };

    try {
      await set(scheduleRef, payload);
      alert("Horario semanal guardado.");
    } catch (err) {
      alert("Error al guardar.");
      console.error(err);
    } finally {
      btn.disabled = false;
      btn.textContent = "Guardar";
    }
  };

  document.getElementById("clear-button").onclick = () => {
    if (confirm("¿Limpiar el horario semanal? (no afecta los nombres abajo)")) {
      document.querySelectorAll('.day-column').forEach(c => c.innerHTML = '');
    }
  };

  // ── Preventistas ────────────────────────────────────────────────────────────
  const preventistasRef = ref(db, `${sucursalCode}/preventistas_schedule`);

  onValue(preventistasRef, snap => {
    const data = snap.val() || {};
    document.getElementById("ultimo-guardado-preventistas").textContent = 
      data.last_saved ? `(Último: ${data.last_saved})` : "";
    document.querySelectorAll(".preventistas-grid input").forEach(input => {
      const day = input.dataset.day;
      const prev = input.dataset.prev;
      input.value = data[day]?.[`P${prev}`] || '';
    });
  });

  document.getElementById("save-preventistas-button").onclick = async () => {
    const btn = document.getElementById("save-preventistas-button");
    btn.disabled = true;
    btn.textContent = "Guardando...";

    const data = { Lunes: {}, Martes: {}, Miércoles: {}, Jueves: {}, Viernes: {}, Sábado: {}, Domingo: {}, last_saved: new Date().toLocaleString("es-AR") };

    document.querySelectorAll(".preventistas-grid input").forEach(input => {
      const value = input.value.trim();
      if (value) {
        const day = input.dataset.day;
        const prevKey = `P${input.dataset.prev}`;
        data[day][prevKey] = value;
      }
    });

    try {
      await set(preventistasRef, data);
      alert("Preventistas guardados.");
    } catch (err) {
      alert("Error al guardar preventistas.");
      console.error(err);
    } finally {
      btn.disabled = false;
      btn.textContent = "Guardar Preventistas";
    }
  };

  document.getElementById("clear-preventistas-button").onclick = () => {
    if (confirm("¿Limpiar preventistas?")) {
      document.querySelectorAll(".preventistas-grid input").forEach(i => i.value = "");
    }
  };

  // ── Inicialización ──────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    initEmptySlots();
    reorderCalendarDays(); // ← Cambio agregado
  });
</script>

</body>
