<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Locales</title>

  <style>
    :root {
      --bg: #121317;
      --card: #1B1A1F;
      --text: #EDEDEE;
      --muted: #B3B3B7;
      --radius: 16px;
      --shadow: 0 10px 25px rgba(0,0,0,.35);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      min-height: 100vh;
    }

    .wrap {
      max-width: 1100px;
      padding: 24px;
      width: 100%;
    }

    header {
      text-align: center;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      text-align: center;
      cursor: pointer;
      transition: .2s;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    dialog {
      background: var(--card);
      color: var(--text);
      border-radius: var(--radius);
      padding: 20px;
      border: 1px solid rgba(255,255,255,.12);
      width: 90%;
      max-width: 380px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 12px 0;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--muted);
      border-radius: 6px;
    }

    button {
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .cancel {
      background: var(--muted);
    }
  </style>
</head>

<body>

<main class="wrap">
  <header>
    <h1>Locales</h1>
    <p>Seleccioná una sucursal</p>
  </header>

  <section class="grid">
    <article class="card" data-sucursal="unne"><h2>Unne</h2></article>
    <article class="card" data-sucursal="sarmiento"><h2>Sarmiento</h2></article>
    <article class="card" data-sucursal="alta_gracia"><h2>Alta Gracia</h2></article>
    <article class="card" data-sucursal="morgue"><h2>Morgue</h2></article>
  </section>
</main>

<dialog id="loginDialog">
  <form id="loginForm">
    <h3>Clave de acceso – <span id="sucursalName"></span></h3>

    <input
      type="text"
      id="accessKey"
      placeholder="Ej: unne01"
      required
      autocomplete="off"
    />

    <input type="hidden" id="sucursal" />

    <button type="submit">Ingresar</button>
    <button type="button" class="cancel" onclick="loginDialog.close()">Cancelar</button>
  </form>
</dialog>

<script>
// Claves fijas (solo aquí, nadie las ve ni las puede leer desde afuera)
const clavesValidas = {
  unne: "unne01",
  sarmiento: "sarmiento02",
  alta_gracia: "altagracia03",
  morgue: "morgue04"
};

const sucursalNames = {
  unne: "Unne",
  sarmiento: "Sarmiento",
  alta_gracia: "Alta Gracia",
  morgue: "Morgue"
};

let selectedSucursal = "";

document.querySelectorAll(".card").forEach(card => {
  card.onclick = () => {
    selectedSucursal = card.dataset.sucursal;
    document.getElementById("sucursal").value = selectedSucursal;
    document.getElementById("sucursalName").textContent = sucursalNames[selectedSucursal];
    loginDialog.showModal();
  };
});

document.getElementById("loginForm").addEventListener("submit", e => {
  e.preventDefault();

  const key = document.getElementById("accessKey").value.trim().toLowerCase();
  const sucursal = document.getElementById("sucursal").value;

  // Validación local (sin internet, sin Firebase)
  if (clavesValidas[sucursal] && key === clavesValidas[sucursal]) {
    sessionStorage.setItem("accessKey", key);
    sessionStorage.setItem("sucursal", sucursal);
    window.location.href = "index_kiosco365_tabla.html";  // o el nombre que uses para la siguiente página
  } else {
    alert("Clave inválida. Intentá de nuevo.");
    document.getElementById("accessKey").value = "";
    document.getElementById("accessKey").focus();
  }
});
</script>

</body>
</html>
