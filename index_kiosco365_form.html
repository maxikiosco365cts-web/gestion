<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Turno - Offline PC</title>

    <!-- Bootstrap CSS local -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- jsPDF 1.5.3 local -->
    <script src="js/jspdf.min.js"></script>

    <!-- Firebase SDK compat -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center mb-4">Formulario de Turno</h2>
        <form id="miFormulario">
            <div class="mb-3">
                <label for="name" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="name" name="name" list="lista-empleados" autocomplete="off" required placeholder="Escribe o selecciona...">
                <datalist id="lista-empleados"></datalist>
            </div>

            <div class="mb-3">
                <label for="turno" class="form-label">Turno y Horas</label>
                <div class="d-flex align-items-center">
                    <select class="form-select me-3" id="turno" name="turno" required>
                        <option value="" disabled selected>Selecciona un turno</option>
                        <option value="T1">T1 (08:00 - 16:00)</option>
                        <option value="T2">T2 (16:00 - 00:00)</option>
                        <option value="T3">T3 (00:00 - 08:00)</option>
                    </select>
                    <div class="d-flex">
                        <div class="form-check me-3">
                            <input class="form-check-input" type="radio" name="horas" id="8horas" value="8" required>
                            <label class="form-check-label" for="8horas">8hs</label>
                        </div>
                        <div class="form-check me-3">
                            <input class="form-check-input" type="radio" name="horas" id="12horas" value="12">
                            <label class="form-check-label" for="12horas">12hs</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="horas" id="16horas" value="16">
                            <label class="form-check-label" for="16horas">16hs</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="branchName" class="form-label">Nombre de la Sucursal</label>
                <input type="text" class="form-control" id="branchName" name="branchName" readonly required>
                <!-- Campo readonly - se llena automáticamente desde sessionStorage -->
            </div>

            <div class="mb-3">
                <label for="date" class="form-label">Fecha</label>
                <input type="date" class="form-control" id="date" name="date" required>
            </div>

            <div class="mb-3">
                <label for="number" class="form-label">Número (1-21)</label>
                <input type="number" class="form-control" id="number" name="number" min="1" max="21" required>
            </div>

            <!-- Campos monetarios con formato $ y puntos -->
            <div class="mb-3">
                <label for="caja" class="form-label">Caja (inicial)</label>
                <input type="text" class="form-control" id="caja" name="caja" placeholder="$0">
            </div>
            <div class="mb-3">
                <label for="virtual" class="form-label">Virtual (inicial)</label>
                <input type="text" class="form-control" id="virtual" name="virtual" placeholder="$0">
            </div>
            <div class="mb-3">
                <label for="cajaNombre" class="form-label">Caja (cierre)</label>
                <input type="text" class="form-control" id="cajaNombre" name="cajaNombre" placeholder="$0">
            </div>
            <div class="mb-3">
                <label for="virtualMonto" class="form-label">Virtual (cierre)</label>
                <input type="text" class="form-control" id="virtualMonto" name="virtualMonto" placeholder="$0">
            </div>
            <div class="mb-3">
                <label for="mp" class="form-label">M.P</label>
                <input type="text" class="form-control" id="mp" name="mp" placeholder="$0">
            </div>
            <div class="mb-3">
                <label for="consumo" class="form-label">Consumo</label>
                <input type="text" class="form-control" id="consumo" name="consumo" placeholder="$0">
            </div>
            <div class="mb-3">
                <label for="miPago" class="form-label">Mi Pago</label>
                <input type="text" class="form-control" id="miPago" name="miPago" placeholder="$0">
            </div>

            <div class="mb-3">
                <label for="nota" class="form-label">Nota (máx. 150 caracteres)</label>
                <textarea class="form-control" id="nota" name="nota" maxlength="150" rows="3"></textarea>
            </div>
            <div class="mb-3">
                <label for="pedidosPagados" class="form-label">Pedidos Pagados (Ejemplo: ARCOR: $500)</label>
                <textarea class="form-control" id="pedidosPagados" name="pedidosPagados" rows="5" placeholder="ARCOR: $500\nDIMPRO: $300"></textarea>
            </div>
            <div class="mb-3">
                <label for="pedidosManana" class="form-label">Pedidos para Mañana (Ejemplo: ARCOR: $600)</label>
                <textarea class="form-control" id="pedidosManana" name="pedidosManana" rows="5" placeholder="ARCOR: $600\nDIMPRO: $400"></textarea>
            </div>

            <div class="text-center mt-4">
                <button type="button" class="btn btn-success btn-lg" onclick="finalizarTurno()">
                    Finalizar Turno y Generar PDF
                </button>
            </div>
        </form>
    </div>

    <!-- Bootstrap JS local -->
    <script src="js/bootstrap.bundle.min.js"></script>

    <script>
        // ────────────────────────────────────────────────────────────────
        //  Firebase Config
        // ────────────────────────────────────────────────────────────────
        const firebaseConfig = {
            apiKey: "AIzaSyBlXlh4E3ZA7EZWa1jp9g3D9NYMPA3EU6o",
            authDomain: "maxikiosco365-cts.firebaseapp.com",
            databaseURL: "https://maxikiosco365-cts-default-rtdb.firebaseio.com",
            projectId: "maxikiosco365-cts",
            storageBucket: "maxikiosco365-cts.firebasestorage.app",
            messagingSenderId: "626205380433",
            appId: "1:626205380433:web:3057e76c60629b89b80d70"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ────────────────────────────────────────────────────────────────
        //  Obtener sucursal desde sessionStorage (viene del login offline)
        // ────────────────────────────────────────────────────────────────
        const sucursal = sessionStorage.getItem("sucursal");

        if (!sucursal) {
            alert("No se detectó sucursal. Volvé al inicio e iniciá sesión.");
            window.location.href = "index_kiosco365.html"; // o la página de login
        }

        const sucursalNames = {
            unne: "Unne",
            sarmiento: "Sarmiento",
            alta_gracia: "Alta Gracia",
            morgue: "Morgue"
        };

        const sucursalDisplay = sucursalNames[sucursal] || sucursal.toUpperCase();

        // Ruta dinámica en Firebase según la sucursal
        const pdfsRef = db.ref(`register/${sucursal}`);

        // ────────────────────────────────────────────────────────────────
        //  Inicialización cuando el DOM está listo
        // ────────────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Poner la sucursal automáticamente en el campo (readonly)
            //    Esto se hace CADA VEZ que se carga la página, sin importar backup
            const branchInput = document.getElementById('branchName');
            if (branchInput) {
                branchInput.value = sucursalDisplay;
            }

            // 2. Cargar empleados desde localStorage
            cargarListaEmpleados();

            // 3. Configurar fecha: ayer hasta hoy
            const inputFecha = document.getElementById('date');
            const hoy = new Date();
            const ayer = new Date();
            ayer.setDate(hoy.getDate() - 1);

            const formatDate = date => date.toISOString().split('T')[0];

            inputFecha.setAttribute('min', formatDate(ayer));
            inputFecha.setAttribute('max', formatDate(hoy));

            if (!inputFecha.value) {
                inputFecha.value = formatDate(hoy);
            }
        });

        // ────────────────────────────────────────────────────────────────
        //  IndexedDB Backup - MODIFICADO: Excluir branchName del backup
        // ────────────────────────────────────────────────────────────────
        const DB_NAME = 'FormularioTurnoDB';
        const STORE_NAME = 'backup';
        const DB_VERSION = 1;
        let dbIndexed;

        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onerror = () => console.error('Error al abrir IndexedDB');
        request.onsuccess = (event) => {
            dbIndexed = event.target.result;
            cargarBackup();
        };
        request.onupgradeneeded = (event) => {
            dbIndexed = event.target.result;
            dbIndexed.createObjectStore(STORE_NAME, { keyPath: 'id' });
        };

        function guardarBackup() {
            if (!dbIndexed) return;
            const datos = {};
            
            // Guardar todos los campos EXCEPTO branchName
            document.querySelectorAll('input, select, textarea').forEach(el => {
                if (el.name && el.name !== 'branchName') { // ← EXCLUIR branchName
                    if (el.type === 'radio') {
                        if (el.checked) datos[el.name] = el.value;
                    } else {
                        datos[el.name] = el.value;
                    }
                }
            });
            
            const transaction = dbIndexed.transaction(STORE_NAME, 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            store.put({ id: 1, datos });
        }

        function cargarBackup() {
            if (!dbIndexed) return;
            const transaction = dbIndexed.transaction(STORE_NAME, 'readonly');
            const store = transaction.objectStore(STORE_NAME);
            const req = store.get(1);
            req.onsuccess = () => {
                if (req.result && req.result.datos) {
                    const datos = req.result.datos;
                    Object.keys(datos).forEach(key => {
                        // NO cargar branchName desde el backup
                        if (key === 'branchName') return; // ← IMPORTANTE
                        
                        const el = document.querySelector(`[name="${key}"]`);
                        if (el) {
                            if (el.type === 'radio') {
                                const radio = document.querySelector(`[name="${key}"][value="${datos[key]}"]`);
                                if (radio) radio.checked = true;
                            } else {
                                el.value = datos[key];
                                if (['caja','virtual','cajaNombre','virtualMonto','mp','consumo','miPago'].includes(key)) {
                                    formatearMontoVisual(el);
                                }
                            }
                        }
                    });
                    alert('Datos del turno anterior cargados automáticamente (excepto sucursal).');
                }
            };
        }

        function borrarBackup() {
            if (!dbIndexed) return;
            const transaction = dbIndexed.transaction(STORE_NAME, 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            store.delete(1);
        }

        let timeout;
        document.querySelectorAll('input, select, textarea').forEach(el => {
            // No guardar cambios del campo branchName en el backup
            if (el.name === 'branchName') return; // ← EXCLUIR branchName del autoguardado
            
            el.addEventListener('input', () => {
                clearTimeout(timeout);
                timeout = setTimeout(guardarBackup, 500);
            });
            el.addEventListener('change', guardarBackup);
        });

        // ────────────────────────────────────────────────────────────────
        //  Cargar empleados desde localStorage
        // ────────────────────────────────────────────────────────────────
        const EMPLOYEES_KEY = 'kiosco365_employees_list';

        function loadEmployees() {
            const saved = localStorage.getItem(EMPLOYEES_KEY);
            return saved ? JSON.parse(saved) : ["Miguel", "Abigail", "David", "Daniel"];
        }

        function cargarListaEmpleados() {
            const datalist = document.getElementById('lista-empleados');
            if (!datalist) return;

            datalist.innerHTML = '';

            const empleados = loadEmployees();
            empleados.forEach(nombre => {
                const option = document.createElement('option');
                option.value = nombre;
                datalist.appendChild(option);
            });

            const nameInput = document.getElementById('name');
            if (nameInput) nameInput.value = nameInput.value;
        }

        // ────────────────────────────────────────────────────────────────
        //  Formato monetario
        // ────────────────────────────────────────────────────────────────
        const camposMonetarios = ['caja', 'virtual', 'cajaNombre', 'virtualMonto', 'mp', 'consumo', 'miPago'];

        function formatearMontoVisual(input) {
            let valor = input.value.replace(/[^0-9]/g, '');
            if (!valor) {
                input.value = '';
                return;
            }
            let numero = parseInt(valor, 10);
            let formateado = numero.toLocaleString('es-AR');
            input.value = '$' + formateado;
        }

        function limpiarValorParaGuardar(input) {
            return input.value.replace(/[^0-9]/g, '') || '0';
        }

        camposMonetarios.forEach(id => {
            const input = document.getElementById(id);
            if (!input) return;

            input.addEventListener('input', () => {
                const cursorPos = input.selectionStart;
                const oldLength = input.value.length;

                formatearMontoVisual(input);

                const diff = input.value.length - oldLength;
                input.setSelectionRange(cursorPos + diff, cursorPos + diff);
            });

            input.addEventListener('blur', () => {
                if (input.value === '$') input.value = '';
            });
        });

        // ────────────────────────────────────────────────────────────────
        //  FUNCIÓN PARA GENERAR LA NUEVA KEY DE FIREBASE
        //  Formato: YYYY_MM_DD_TX (ej: 2026_01_13_T1)
        // ────────────────────────────────────────────────────────────────
        function generarKeyFirebase() {
            // 1. Obtener fecha del formulario
            const fechaInput = document.getElementById('date').value; // Formato: "2026-01-13"
            
            if (!fechaInput) {
                console.error('No hay fecha seleccionada');
                return 'fecha_no_valida_T0';
            }
            
            // 2. Formatear a YYYY_MM_DD
            const fechaFormateada = fechaInput.replace(/-/g, '_'); // "2026_01_13"
            
            // 3. Obtener turno del formulario
            const turnoSelect = document.getElementById('turno');
            const turno = turnoSelect ? turnoSelect.value : 'T0';
            
            // 4. Validar que el turno sea T1, T2 o T3
            const turnoValido = ['T1', 'T2', 'T3'].includes(turno) ? turno : 'T0';
            
            // 5. Combinar
            return `${fechaFormateada}_${turnoValido}`; // Ej: "2026_01_13_T1"
        }

        // ────────────────────────────────────────────────────────────────
        //  Subir PDF a la ruta correcta de la sucursal
        //  MODIFICADO: Solo guardar filename y url (como originalmente)
        // ────────────────────────────────────────────────────────────────
        async function subirPDF(blob, nombreArchivo) {
            const formData = new FormData();
            formData.append('file', blob, nombreArchivo);

            try {
                const response = await fetch('https://api.filebeam.xyz/', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Respuesta no OK de Filebeam');

                const url = await response.text();

                // USAR LA NUEVA KEY
                const key = generarKeyFirebase();
                
                // SOLO guardar filename y url (como originalmente)
                await pdfsRef.child(key).set({
                    filename: nombreArchivo,
                    url: url.trim()
                    // Se removieron los datos extras: fecha, turno, sucursal, timestamp
                });

                alert(`¡Todo perfecto!\nPDF descargado localmente y subido a Filebeam.\nKey en Firebase: ${key}\nEnlace: ${url.trim()}`);
            } catch (err) {
                console.error('Error al subir PDF:', err);
                alert('PDF generado y descargado localmente.\nError al subir a Filebeam.');
            }
        }

        // ────────────────────────────────────────────────────────────────
        //  Funciones principales
        // ────────────────────────────────────────────────────────────────
        function finalizarTurno() {
            const form = document.getElementById('miFormulario');
            if (!form.checkValidity()) {
                form.reportValidity();
                alert('Por favor, completa todos los campos requeridos.');
                return;
            }

            generarPDF();

            if (confirm('¿Turno finalizado? Se borrará el backup para el próximo turno.')) {
                borrarBackup();
                alert('Backup borrado. ¡Listo para el siguiente turno!');
            }
        }

        function generarPDF() {
            const form = document.getElementById('miFormulario');
            const valores = {};

            new FormData(form).forEach((v, k) => {
                if (camposMonetarios.includes(k)) {
                    const input = document.getElementById(k);
                    valores[k] = limpiarValorParaGuardar(input);
                } else {
                    valores[k] = v;
                }
            });

            // Generar nombre del archivo PDF
            let fechaNombre = 'sinfecha';
            if (valores.date) {
                const [year, month, day] = valores.date.split('-');
                fechaNombre = `${year}_${month}_${day}`;
            }

            const turnoConHoras = valores.turno ? `${valores.turno}${valores.horas ? ` (${valores.horas}hs)` : ''}` : '';
            const nombreArchivo = `${fechaNombre}_${valores.turno || 'SinTurno'}_${valores.name || 'SinNombre'}.pdf`;

            // Crear PDF
            const pdf = new jsPDF({
                orientation: 'portrait',
                unit: 'mm',
                format: 'a4'
            });

            function truncateText(text, maxWidth) {
                let t = text || '';
                let w = pdf.getTextWidth(t);
                if (w <= maxWidth) return t;
                while (w > maxWidth && t.length > 0) {
                    t = t.slice(0, -1);
                    w = pdf.getTextWidth(t + '...');
                }
                return t + '...';
            }

            const maxW = 40;
            pdf.text(truncateText(valores.name, maxW), 20, 20);
            pdf.text(truncateText(turnoConHoras, maxW), 60, 20);
            pdf.text(truncateText(valores.branchName, maxW), 90, 20);
            pdf.text(truncateText(valores.date, maxW), 130, 20);

            const circleX = 170;
            const circleY = 18;
            const radius = 6;
            pdf.setDrawColor(0);
            pdf.circle(circleX, circleY, radius, 'S');

            pdf.setFontSize(16);
            pdf.text(valores.number || '', circleX, circleY + 1, { align: 'center' });
            pdf.setFontSize(12);
            
            pdf.text(`Caja: ${valores.caja || '0'}`, 20, 40);
            pdf.text(`Virtual: ${valores.virtual || '0'}`, 20, 50);
            pdf.text(`Caja (Cierre): ${valores.cajaNombre || '0'}`, 20, 70);
            pdf.text(`Virtual (Cierre): ${valores.virtualMonto || '0'}`, 20, 80);
            pdf.text(`M.P: ${valores.mp || '0'}`, 20, 90);
            pdf.text(`Consumo: ${valores.consumo || '0'}`, 20, 110);
            pdf.text(`Mi Pago: $${valores.miPago || '0'}`, 20, 120);

            const notaLines = pdf.splitTextToSize(`Nota: ${valores.nota || ''}`, 170);
            let y = 140;
            for (let i = 0; i < Math.min(3, notaLines.length); i++) {
                pdf.text(notaLines[i], 20, y);
                y += 7;
            }

            pdf.setDrawColor(0);
            pdf.setFillColor(240, 240, 240);
            pdf.roundedRect(20, y + 10, 170, 100, 3, 3, 'FD');
            pdf.line(105, y + 10, 105, y + 110);

            pdf.setFontSize(14);
            pdf.text('Pedidos Pagados', 22, y + 20);
            pdf.text('Pedidos para Mañana', 107, y + 20);

            pdf.setFontSize(10);
            const pagados = (valores.pedidosPagados || '').split('\n');
            let yp = y + 30;
            pagados.forEach(line => {
                if (yp < y + 105) {
                    pdf.text(truncateText(line, 80), 22, yp);
                    yp += 7;
                }
            });

            const manana = (valores.pedidosManana || '').split('\n');
            let ym = y + 30;
            manana.forEach(line => {
                if (ym < y + 105) {
                    pdf.text(truncateText(line, 80), 107, ym);
                    ym += 7;
                }
            });

            // Guardar PDF localmente
            pdf.save(nombreArchivo);

            // Subir PDF al servidor y guardar en Firebase
            const blob = pdf.output('blob');
            subirPDF(blob, nombreArchivo);
        }
    </script>
</body>
</html>
